<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Integration Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🌐 API Integration Hub</h1>
                <p class="subtitle">Real-time data from multiple external APIs</p>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="weather">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                    <circle cx="12" cy="12" r="5"></circle>
                </svg>
                Weather
            </button>
            <button class="tab-btn" data-tab="news">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
                </svg>
                News
            </button>
            <button class="tab-btn" data-tab="crypto">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"></path>
                </svg>
                Crypto
            </button>
            <button class="tab-btn" data-tab="quotes">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path>
                </svg>
                Quotes
            </button>
        </div>

        <!-- Tab Content -->
        <div class="tab-content active" id="weather-tab">
            <div class="section-header">
                <h2>Weather Information</h2>
                <div class="search-box">
                    <input type="text" id="city-input" placeholder="Enter city name..." value="London">
                    <button class="search-btn" onclick="fetchWeather()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        Search
                    </button>
                </div>
            </div>
            <div id="weather-content" class="content-area">
                <div class="loader"></div>
            </div>
        </div>

        <div class="tab-content" id="news-tab">
            <div class="section-header">
                <h2>Latest News</h2>
                <select id="news-category" onchange="fetchNews()">
                    <option value="general">General</option>
                    <option value="technology">Technology</option>
                    <option value="business">Business</option>
                    <option value="sports">Sports</option>
                    <option value="entertainment">Entertainment</option>
                </select>
            </div>
            <div id="news-content" class="content-area">
                <div class="loader"></div>
            </div>
        </div>

        <div class="tab-content" id="crypto-tab">
            <div class="section-header">
                <h2>Cryptocurrency Prices</h2>
                <button class="refresh-btn" onclick="fetchCrypto()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.2"></path>
                    </svg>
                    Refresh
                </button>
            </div>
            <div id="crypto-content" class="content-area">
                <div class="loader"></div>
            </div>
        </div>

        <div class="tab-content" id="quotes-tab">
            <div class="section-header">
                <h2>Random Quotes</h2>
                <button class="refresh-btn" onclick="fetchQuote()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.2"></path>
                    </svg>
                    New Quote
                </button>
            </div>
            <div id="quotes-content" class="content-area">
                <div class="loader"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
